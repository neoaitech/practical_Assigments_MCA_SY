<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
 <nav>
        <h2>Student Skill Portfolio</h2>

        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="profileSection.html">Profile</a></li>
            <li><a href="projectSection.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
<body>

<section class="contact">

    <div class="title">
        <h1>Let's Connect</h1>
        <p>Questions, ideas or feedback? We'd love to hear from you.</p>
    </div>

    <div class="container">

        <!-- Left -->

        <div class="left">

            <div class="card">
                <i class="fa-solid fa-envelope"></i>
                <h3>Email</h3>
                <p>skillportfolio@gmail.com</p>
            </div>

            <div class="card">
                <i class="fa-solid fa-phone"></i>
                <h3>Phone</h3>
                <p>+91 98765 43210</p>
            </div>

            <div class="card">
                <i class="fa-solid fa-location-dot"></i>
                <h3>Location</h3>
                <p>India</p>
            </div>

            <div class="social">

                <a href="#"><i class="fab fa-github"></i></a>

                <a href="#"><i class="fab fa-linkedin"></i></a>

                <a href="#"><i class="fab fa-instagram"></i></a>

            </div>

        </div>

        <!-- Right -->

        <div class="right">

            <form>

                <input
                type="text"
                placeholder="Full Name"
                required>

                <input
                type="email"
                placeholder="Email Address"
                required>

                <input
                type="text"
                placeholder="Subject">

                <textarea
                rows="6"
                placeholder="Write your message..."
                required></textarea>

                <button>Send Message</button>

            </form>

        </div>

    </div>

</section>

</body>
</html>
